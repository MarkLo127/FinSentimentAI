server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed static assets aggressively (vite emits content-hashed names)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → backend service in the docker-compose network
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Default 60s isn't enough for /stocks/{symbol}/refresh which can
        # take 60–120s (pipeline + Claude analysis chained synchronously).
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback — React Router owns client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
